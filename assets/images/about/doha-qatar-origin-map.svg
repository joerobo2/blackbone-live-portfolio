<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Doha, Qatar global context map</title>
  <desc id="desc">A stylized public-safe map card showing Doha, Qatar as a formative international context.</desc>

  <defs>
    <linearGradient id="sea" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#082f49"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="land" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  
    <filter id="goldGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 1
                0 0.74 0 0 0.62
                0 0 0.18 0 0.12
                0 0 0 0.85 0" result="goldBlur"/>
      <feMerge>
        <feMergeNode in="goldBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <rect width="900" height="620" rx="34" fill="url(#sea)"/>

  <g opacity="0.18" stroke="#38bdf8" stroke-width="1">
    <path d="M80 120 C180 80, 260 170, 360 130 S590 90, 810 150" fill="none"/>
    <path d="M60 455 C180 390, 280 500, 400 445 S610 385, 840 470" fill="none"/>
    <path d="M150 40 V580"/>
    <path d="M310 40 V580"/>
    <path d="M470 40 V580"/>
    <path d="M630 40 V580"/>
    <path d="M790 40 V580"/>
  </g>

  <!-- Stylized regional land masses, not a survey-accurate map -->
  <path d="M270 175 C230 220, 222 300, 245 370 C268 445, 340 495, 430 500 C505 504, 578 468, 622 410 C665 352, 670 270, 630 215 C587 156, 500 132, 420 138 C355 143, 305 145, 270 175Z"
        fill="#0b1220" stroke="#1e3a8a" stroke-width="2" opacity="0.72"/>

  <!-- Qatar silhouette, stylized -->
  <path d="M515 130
           C560 148, 590 190, 594 244
           C598 300, 583 350, 605 410
           C622 458, 590 506, 535 522
           C494 533, 455 515, 442 476
           C426 428, 455 386, 453 340
           C451 294, 430 259, 444 215
           C458 174, 480 142, 515 130Z"
        fill="url(#land)" opacity="0.92" filter="url(#glow)"/>

  <path d="M515 130
           C560 148, 590 190, 594 244
           C598 300, 583 350, 605 410
           C622 458, 590 506, 535 522
           C494 533, 455 515, 442 476
           C426 428, 455 386, 453 340
           C451 294, 430 259, 444 215
           C458 174, 480 142, 515 130Z"
        fill="none" stroke="#bae6fd" stroke-width="3" opacity="0.8"/>

  <!-- Doha marker: gold signal point -->
  <circle cx="585" cy="280" r="34" fill="#facc15" opacity="0.10" filter="url(#goldGlow)"/>
  <circle cx="585" cy="280" r="22" fill="none" stroke="#facc15" stroke-width="3" opacity="0.75"/>
  <circle cx="585" cy="280" r="12" fill="#fde68a" filter="url(#goldGlow)"/>
  <circle cx="581" cy="276" r="4" fill="#fff7ed" opacity="0.95"/>
  <line x1="585" y1="280" x2="695" y2="222" stroke="#fde68a" stroke-width="2" opacity="0.85"/>

  <text x="66" y="92" fill="#38bdf8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="4">
    GLOBAL PERSPECTIVE
  </text>

  <text x="66" y="142" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900" letter-spacing="-2">
    Doha, Qatar
  </text>

  <text x="690" y="210" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">
    DOHA
  </text>
</svg>
