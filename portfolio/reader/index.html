<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Evidence Reader | Joseph Robinson Portfolio</title>
  <meta name="description" content="Evidence reader for Joseph Robinson's IST 782 applied data science portfolio.">
  <link rel="stylesheet" href="/assets/css/site.css?v=reader-clean-separation-v17">

  <script>
    /* READER_RESUME_SEPARATION_REDIRECT_V16
       Resume no longer belongs to Evidence Reader.
       Old /portfolio/reader/?doc=resume links are routed to /portfolio/resume/.
    */
    (function () {
      var params = new URLSearchParams(window.location.search || "");
      if ((params.get("doc") || "").toLowerCase() === "resume") {
        window.location.replace("/portfolio/resume/");
      }
    })();
  </script>

</head>
<body>
  <div class="reader-shell">
    <nav class="reader-toolbar">
      <div>
        <div class="kicker">Evidence Reader</div>
        <h1 class="reader-title" data-reader-title>Loading evidence…</h1>
        <p class="reader-meta" data-reader-meta>Loading metadata…</p>
      </div>
      <div class="reader-actions">
        <a class="button secondary" href="/portfolio/evidence/">Evidence Library</a>
        <a class="button secondary" href="/portfolio/">Portfolio Home</a>
        <a class="button primary" href="#" data-reader-download>Open Source File</a>
      </div>
    </nav>

    <main class="reader-frame" data-reader-frame>
      <div class="reader-error">
        <p>Loading evidence…</p>
      </div>
    </main>
  </div>

  <script src="/assets/js/reader.js"></script>


<script>
  // READER_PRESENTATION_RETURN_V1
  (function () {
    const params = new URLSearchParams(window.location.search);
    if (params.get("from") !== "presentation") return;

    const slide = params.get("slide") || "1";
    const href = "/portfolio/presentation/#slide-" + encodeURIComponent(slide);

    const button = document.createElement("a");
    button.className = "button secondary reader-return-presentation";
    button.href = href;
    button.textContent = "Back to Presentation";

    const evidenceButton = Array.from(document.querySelectorAll("a")).find((link) =>
      link.textContent.trim().toLowerCase() === "evidence library"
    );

    if (evidenceButton && evidenceButton.parentElement) {
      evidenceButton.parentElement.insertBefore(button, evidenceButton);
      return;
    }

    const header = document.querySelector("header") || document.body;
    header.prepend(button);
  })();
</script>

</body>
</html>
