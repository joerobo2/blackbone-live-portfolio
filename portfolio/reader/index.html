<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resume | Joseph Robinson Portfolio</title>
  <meta name="description" content="Evidence reader for Joseph Robinson's IST 782 applied data science portfolio.">
  <link rel="stylesheet" href="/assets/css/site.css?v=resume-mobile-back-link-v32">
</head>
<body>
  <div class="reader-shell">
    <nav class="reader-toolbar">
      <div>
        <div class="kicker">Resume</div>
        <h1 class="reader-title" data-reader-title>Loading evidence…</h1>
        <p class="reader-meta" data-reader-meta>Loading metadata…</p>
      </div>
      <div class="reader-actions">
        <a class="button primary" href="/portfolio/about/">Back to About</a>
        <a class="button secondary" href="/assets/evidence/pdfs/Joseph_Robinson_Resume.pdf" target="_blank" rel="noopener">Open PDF</a>
      </div>
    </nav>

    <main class="reader-frame" data-reader-frame>
      <div class="reader-error">
        <p>Loading evidence…</p>
      </div>
    </main>
  </div>

  <script src="/assets/js/reader.js"></script>

  <script>
    /* RESUME_READER_IMAGE_PREVIEW_V12
       Makes /portfolio/reader/?doc=resume an About-bound resume preview.
       No embedded PDF viewer. No explanation block. No Evidence Library default path.
    */
    (function () {
      const params = new URLSearchParams(window.location.search);
      const isResume = params.get("doc") === "resume";
      if (!isResume) return;

      const pdfHref = "/assets/evidence/pdfs/Joseph_Robinson_Resume.pdf";
      const previewHref = "/assets/evidence/images/Joseph_Robinson_Resume_preview.png";

      function previewMarkup() {
        return `
          <section class="resume-preview-stage" aria-label="Joseph Robinson resume preview">
            <a class="resume-preview-link" href="${pdfHref}" target="_blank" rel="noopener" aria-label="Open resume PDF">
              <img class="resume-preview-image" src="${previewHref}" alt="Joseph Robinson resume preview">
            </a>
            <div class="resume-preview-fallback" hidden>
              <a class="button primary" href="${pdfHref}" target="_blank" rel="noopener">Open PDF</a>
            </div>
          </section>
        `;
      }

      function applyResumeMode() {
        document.body.classList.add("resume-reader-page", "resume-reader-image-page");
        document.title = "Joseph Robinson Resume";

        const kicker = document.querySelector(".reader-toolbar .kicker");
        if (kicker) kicker.textContent = "Resume";

        const title = document.querySelector("[data-reader-title]");
        if (title) title.textContent = "Joseph Robinson";

        const meta = document.querySelector("[data-reader-meta]");
        if (meta) meta.textContent = "PDF Resume";

        const actions = document.querySelector(".reader-actions");
        if (actions) {
          actions.innerHTML = `
            <a class="button primary" href="/portfolio/about/">Back to About</a>
            <a class="button secondary" href="${pdfHref}" target="_blank" rel="noopener">Open PDF</a>
          `;
        }

        const frame = document.querySelector("[data-reader-frame]");
        if (frame && !frame.querySelector(".resume-preview-stage")) {
          frame.innerHTML = previewMarkup();
        }

        const previewImg = document.querySelector(".resume-preview-image");
        const fallback = document.querySelector(".resume-preview-fallback");
        if (previewImg && fallback) {
          previewImg.addEventListener("error", function () {
            previewImg.hidden = true;
            fallback.hidden = false;
          }, { once: true });
        }
      }

      function startObserver() {
        const frame = document.querySelector("[data-reader-frame]");
        if (!frame) return;

        const observer = new MutationObserver(() => applyResumeMode());
        observer.observe(frame, { childList: true, subtree: true });
        setTimeout(() => observer.disconnect(), 4000);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", function () {
          applyResumeMode();
          startObserver();
        });
      } else {
        applyResumeMode();
        startObserver();
      }

      setTimeout(applyResumeMode, 250);
      setTimeout(applyResumeMode, 750);
      setTimeout(applyResumeMode, 1500);
    })();
  </script>



  <script>
    /* RESUME_READER_CHROME_FIX_V13
       When reader is opened with ?doc=resume, replace old Evidence Reader chrome
       with resume-specific title and actions.
    */
    (function () {
      function isResumeDoc() {
        const params = new URLSearchParams(window.location.search);
        return (params.get("doc") || "").toLowerCase() === "resume";
      }

      function setText(selector, value) {
        const el = document.querySelector(selector);
        if (el) el.textContent = value;
      }

      function fixResumeChrome() {
        if (!isResumeDoc()) return;

        document.title = "Resume | Joseph Robinson Portfolio";
        document.body.classList.add("resume-reader-image-page");

        setText(".kicker", "Resume");

        const h1 = document.querySelector("h1");
        if (h1) h1.textContent = "Joseph Robinson";

        const subtitle =
          document.querySelector(".reader-subtitle") ||
          document.querySelector(".page-subtitle") ||
          document.querySelector("main p");

        if (subtitle && /Resume|PDF|Evidence|Reader/i.test(subtitle.textContent || "")) {
          subtitle.textContent = "PDF Resume";
        }

        const actionRow =
          document.querySelector(".hero-actions") ||
          document.querySelector(".reader-actions") ||
          document.querySelector(".page-actions") ||
          document.querySelector("main .actions") ||
          document.querySelector("header + div") ||
          document.querySelector("main");

        const oldButtons = [...document.querySelectorAll("a.button")];

        oldButtons.forEach(a => {
          const txt = (a.textContent || "").trim();
          if (/Evidence Library|Portfolio Home|Open Source File/i.test(txt)) {
            a.remove();
          }
        });

        const existingBack = [...document.querySelectorAll("a")]
          .some(a => (a.textContent || "").trim() === "Back to About");

        if (!existingBack) {
          const container =
            document.querySelector(".hero-actions") ||
            document.querySelector(".reader-actions") ||
            document.querySelector(".page-actions");

          if (container) {
            container.insertAdjacentHTML("afterbegin", `
              <a class="button primary" href="/portfolio/about/">Back to About</a>
              <a class="button secondary" href="/assets/evidence/pdfs/Joseph_Robinson_Resume.pdf" target="_blank" rel="noopener">Open PDF</a>
            `);
          }
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", fixResumeChrome);
      } else {
        fixResumeChrome();
      }
    })();
  </script>


  <script>
    /* RESUME_MOBILE_BACK_LINK_V32
       On mobile, Back to About goes directly to the dedicated mobile About page.
    */
    (function () {
      function isMobile() {
        var ua = navigator.userAgent || "";
        var width = Math.min(
          window.innerWidth || 9999,
          screen.width || 9999,
          document.documentElement ? document.documentElement.clientWidth || 9999 : 9999
        );
        return width <= 860 || /iPhone|iPod|Android.*Mobile|Mobile Safari|CriOS.*Mobile|FxiOS/i.test(ua);
      }

      function patchBackLinks() {
        if (!isMobile()) return;

        document.querySelectorAll('a[href="/portfolio/about/"]').forEach(function (a) {
          if ((a.textContent || "").trim() === "Back to About") {
            a.setAttribute("href", "/portfolio/about/mobile/");
          }
        });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", patchBackLinks);
      } else {
        patchBackLinks();
      }

      window.addEventListener("pageshow", patchBackLinks);
    })();
  </script>

</body>
</html>
