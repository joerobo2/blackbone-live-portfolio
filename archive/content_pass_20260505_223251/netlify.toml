[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/presentation"
  to = "/portfolio/presentation/"
  status = 301

[[redirects]]
  from = "/presentation/"
  to = "/portfolio/presentation/"
  status = 301

[[redirects]]
  from = "/case-studies"
  to = "/portfolio/case-studies/"
  status = 301

[[redirects]]
  from = "/case-studies/"
  to = "/portfolio/case-studies/"
  status = 301

[[redirects]]
  from = "/evidence"
  to = "/portfolio/evidence/"
  status = 301

[[redirects]]
  from = "/evidence/"
  to = "/portfolio/evidence/"
  status = 301

[[redirects]]
  from = "/reflection"
  to = "/portfolio/reflection/"
  status = 301

[[redirects]]
  from = "/reflection/"
  to = "/portfolio/reflection/"
  status = 301
