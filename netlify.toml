[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-src 'self'; object-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"

[[redirects]]
  from = "/presentation"
  to = "/portfolio/presentation/"
  status = 301

[[redirects]]
  from = "/presentation/"
  to = "/portfolio/presentation/"
  status = 301

[[redirects]]
  from = "/case-studies"
  to = "/portfolio/case-studies/"
  status = 301

[[redirects]]
  from = "/case-studies/"
  to = "/portfolio/case-studies/"
  status = 301

[[redirects]]
  from = "/evidence"
  to = "/portfolio/evidence/"
  status = 301

[[redirects]]
  from = "/evidence/"
  to = "/portfolio/evidence/"
  status = 301

[[redirects]]
  from = "/reflection"
  to = "/portfolio/reflection/"
